# ========================================
# Docker Compose Configuration
# Modern Node.js Todo Application
# ========================================

services:
  # ========================================
  # Development Service
  # ========================================
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minimalinitbase-dev
    ports:
      - '${APP_PORT:-3000}:3000' # API server
      - '${DEBUG_PORT:-9229}:9229' # Node.js debugger
    environment:
      NODE_ENV: development
      DOCKER_ENV: 'true'
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: db
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-db_password}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-http://localhost:3000}'
    volumes:
      - .:/app # Sync entire project for development
      - /app/node_modules # Prevent overwriting node_modules with host files
      - ./package.json:/app/package.json # Sync package.json for dependency changes
      
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - '**/*.test.*'
            - '**/__tests__/**'
        - action: rebuild
          path: ./package.json
    restart: unless-stopped
    networks:
      - minimalinitbase-network

  # ========================================
  # Production Service
  # ========================================
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: minimalinitbase-prod
    ports:
      - '${PROD_PORT:-8080}:3000'
    environment:
      NODE_ENV: production
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: minimalinitbase
      POSTGRES_USER: minimalinitbase
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-minimalinitbase_password}'
      ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-https://yourdomain.com}'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: '${PROD_MEMORY_LIMIT:-2G}'
          cpus: '${PROD_CPU_LIMIT:-1.0}'
        reservations:
          memory: '${PROD_MEMORY_RESERVATION:-512M}'
          cpus: '${PROD_CPU_RESERVATION:-0.25}'
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - minimalinitbase-network
    profiles:
      - prod

  # ========================================
  # PostgreSQL Database Service
  # ========================================
  db:
    image: postgres:18-alpine
    container_name: minimalinitbase-db
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-db}'
      POSTGRES_USER: '${POSTGRES_USER:-db_user}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-db_password}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-minimalinitbase} -d ${POSTGRES_DB:-minimalinitbase}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - minimalinitbase-network

# ========================================
# Volume Configuration
# ========================================
volumes:
  postgres_data:
    name: minimalinitbase-postgres-data
    driver: local

# ========================================
# Network Configuration
# ========================================
networks:
  minimalinitbase-network:
    name: minimalinitbase-network
    driver: bridge
